    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; font-family:"Segoe UI","Microsoft YaHei",sans-serif; color:var(--ink); background:radial-gradient(circle at 12% 8%,rgba(255,196,112,.38),transparent 28rem),radial-gradient(circle at 88% 12%,rgba(95,168,121,.28),transparent 26rem),linear-gradient(135deg,#f8f1dc 0%,#eef5e8 48%,#fffaf0 100%); }
    .shell { width:min(1180px,calc(100% - 32px)); margin:0 auto; padding:36px 0 44px; }
    header { display:flex; justify-content:space-between; gap:24px; align-items:flex-end; margin-bottom:22px; }
    h1 { margin:0; font-size:clamp(32px,5vw,60px); letter-spacing:-.05em; line-height:.96; }
    .subtitle { margin:12px 0 0; color:var(--muted); font-size:16px; }
    .stats { display:flex; gap:10px; flex-wrap:wrap; justify-content:flex-end; }
    .pill { padding:10px 14px; border:1px solid var(--line); border-radius:999px; background:rgba(255,255,255,.52); color:var(--muted); font-size:14px; backdrop-filter:blur(10px); }
    .layout { display:grid; grid-template-columns:300px 1fr; gap:22px; align-items:start; }
    .panel,.card { background:var(--card); border:1px solid var(--line); border-radius:28px; box-shadow:var(--shadow); backdrop-filter:blur(18px); }
    .panel { padding:16px; position:sticky; top:16px; }
    .group-list { display:grid; gap:10px; }
    .group-btn { width:100%; border:1px solid transparent; border-radius:18px; padding:14px; background:rgba(255,255,255,.56); text-align:left; cursor:pointer; color:var(--ink); transition:160ms ease; }
    .group-btn:hover { transform:translateY(-1px); border-color:rgba(30,127,86,.32); }
    .group-btn.active { background:#173f2d; color:white; }
    .group-btn.done { border-color:rgba(30,127,86,.42); }
    .group-title { display:flex; justify-content:space-between; gap:10px; font-weight:700; }
    .group-progress { margin-top:8px; height:8px; overflow:hidden; border-radius:999px; background:rgba(23,33,27,.1); }
    .group-progress span { display:block; height:100%; background:linear-gradient(90deg,#56b378,#1e7f56); }
    .card { padding:clamp(22px,4vw,40px); min-height:560px; }
    .toolbar { display:flex; justify-content:space-between; gap:12px; align-items:center; margin-bottom:28px; flex-wrap:wrap; }
    .badge { color:var(--green-dark); background:rgba(30,127,86,.1); border:1px solid rgba(30,127,86,.18); padding:9px 12px; border-radius:999px; font-weight:700; }
    .mini-actions { display:flex; gap:10px; flex-wrap:wrap; }
    button { font:inherit; }
    .soft-btn { border:1px solid var(--line); background:rgba(255,255,255,.65); color:var(--ink); border-radius:999px; padding:10px 14px; cursor:pointer; }
    .soft-btn:hover { border-color:rgba(30,127,86,.38); }
    .sync-note { width:100%; min-height:22px; color:var(--muted); font-size:13px; text-align:right; }
    .question { display:grid; gap:18px; place-items:center; text-align:center; padding:44px 12px 34px; }
    .zh { font-size:clamp(42px,7vw,84px); font-weight:900; letter-spacing:-.04em; line-height:1.08; }
    .count { color:var(--muted); }
    .input-row { display:flex; width:min(720px,100%); gap:12px; margin:0 auto; }
    input { flex:1; border:2px solid rgba(23,33,27,.13); border-radius:22px; padding:18px 20px; font-size:24px; outline:none; background:rgba(255,255,255,.85); color:var(--ink); }
    input:focus { border-color:rgba(30,127,86,.58); box-shadow:0 0 0 5px rgba(30,127,86,.1); }
    .submit { border:0; border-radius:22px; padding:0 28px; background:var(--green); color:white; font-weight:900; cursor:pointer; }
    .submit:hover { background:var(--green-dark); }
    .feedback { min-height:28px; text-align:center; margin-top:14px; font-weight:800; }
    .feedback.ok { color:var(--green); } .feedback.bad { color:var(--red); }
    .progress-strip { margin-top:32px; }
    .bar { height:16px; border-radius:999px; background:rgba(23,33,27,.1); overflow:hidden; }
    .bar span { display:block; height:100%; background:linear-gradient(90deg,#ffb85c,#1e7f56); transition:width 260ms ease; }
    .word-grid { margin-top:18px; display:grid; grid-template-columns:repeat(auto-fill,minmax(44px,1fr)); gap:8px; }
    .dot { height:34px; border-radius:12px; display:grid; place-items:center; font-size:13px; color:var(--muted); background:rgba(255,255,255,.58); border:1px solid var(--line); }
    .dot.one { color:#9b5c18; border-color:rgba(215,119,47,.35); background:rgba(255,184,92,.16); }
    .dot.two { color:white; border-color:transparent; background:var(--green); }
    .empty { padding:80px 20px; text-align:center; color:var(--muted); }
    @media (max-width:860px) { header { align-items:flex-start; flex-direction:column; } .stats { justify-content:flex-start; } .layout { grid-template-columns:1fr; } .panel { position:static; } .input-row { flex-direction:column; } .submit { padding:16px 18px; } }
  </style>

    const TEXT = {"page": "听力错词拼写闯关", "headline": "听力错词<br>拼写闯关", "subtitle": "只看中文，拼英文。每个词完整拼对两次才过关；组内顺序已打乱。", "words": "词", "passed": "已过", "per_group": "每组 50 个", "group1": "第1组", "shuffle": "重新打乱本组", "reset_group": "重置本组", "reset_all": "清空全部进度", "input": "输入英文完整拼写", "submit": "提交", "done_title": "本组已过关", "done_desc": "这一组所有词都已经完整拼对两次，可以切下一组了。", "current": "当前词进度", "ok_done": "正确，已过关。", "ok_once": "正确，还需要再拼对 1 次。", "bad": "拼错了，本轮不计。", "answer": "正确答案", "next": "下一题", "confirm": "确定清空全部拼写进度吗？"};
    const STORAGE_KEY = 'ielts-listening-spelling-progress-v2';
    let activeGroup = 0;
    let currentItem = null;
    let localOrder = GROUPS.map(g => g.items.map((_, i) => i));
    function loadProgress() { try { const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); return saved && typeof saved === 'object' ? saved : {}; } catch { return {}; } }
    let progress = loadProgress();
    function saveProgress() { localStorage.setItem(STORAGE_KEY, JSON.stringify(progress)); }
    function showSyncNote(message) {
      const note = document.getElementById('syncNote');
      note.textContent = message;
      clearTimeout(showSyncNote.timer);
      showSyncNote.timer = setTimeout(() => { note.textContent = ''; }, 4200);
    }
    function encodeProgressCode() {
      const payload = { app: 'ielts-listening-spelling', version: 2, savedAt: new Date().toISOString(), progress };
      return btoa(unescape(encodeURIComponent(JSON.stringify(payload))));
    }
    function decodeProgressCode(code) {
      const payload = JSON.parse(decodeURIComponent(escape(atob(code.trim()))));
      if (!payload || payload.app !== 'ielts-listening-spelling' || payload.version !== 2 || !payload.progress || typeof payload.progress !== 'object') {
        throw new Error('invalid progress code');
      }
      const cleaned = {};
      Object.entries(payload.progress).forEach(([key, value]) => {
        if (/^\d+:\d+$/.test(key)) cleaned[key] = Math.min(2, Math.max(0, Number(value) || 0));
      });
      return cleaned;
    }
    function keyOf(groupIndex, itemIndex) { return `${groupIndex}:${itemIndex}`; }
    function countOf(groupIndex, itemIndex) { return Math.min(2, progress[keyOf(groupIndex, itemIndex)] || 0); }
    function setCount(groupIndex, itemIndex, value) { progress[keyOf(groupIndex, itemIndex)] = Math.min(2, Math.max(0, value)); saveProgress(); }
    function normalizeAnswer(value) { return value.trim().replace(/\s+/g, ' ').toLowerCase(); }
    function shuffleArray(arr) { for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [arr[i], arr[j]] = [arr[j], arr[i]]; } }
    function groupStats(groupIndex) { const items = GROUPS[groupIndex].items; const points = items.reduce((sum, _, i) => sum + countOf(groupIndex, i), 0); return { done: items.filter((_, i) => countOf(groupIndex, i) >= 2).length, total: items.length, points, max: items.length * 2 }; }
    function allDone() { return GROUPS.reduce((sum, g, gi) => sum + g.items.filter((_, ii) => countOf(gi, ii) >= 2).length, 0); }
    function renderGroups() {
      const list = document.getElementById('groupList'); list.innerHTML = '';
      GROUPS.forEach((group, gi) => {
        const stats = groupStats(gi); const btn = document.createElement('button'); btn.type = 'button'; btn.className = `group-btn ${gi === activeGroup ? 'active' : ''} ${stats.done === stats.total ? 'done' : ''}`;
        btn.innerHTML = `<div class="group-title"><span>${group.title}</span><span>${stats.done}/${stats.total}</span></div><div class="group-progress"><span style="width:${Math.round(stats.points / stats.max * 100)}%"></span></div>`;
        btn.addEventListener('click', () => { activeGroup = gi; pickNext(true); render(); }); list.appendChild(btn);
      });
      document.getElementById('doneStat').textContent = `${TEXT.passed} ${allDone()} / 523`;
    }
    function pickNext(force = false) {
      const group = GROUPS[activeGroup]; if (!force && currentItem && countOf(activeGroup, currentItem.index) < 2) return;
      const available = localOrder[activeGroup].filter(i => countOf(activeGroup, i) < 2); if (!available.length) { currentItem = null; return; }
      const nextIndex = available[0]; localOrder[activeGroup] = localOrder[activeGroup].filter(i => i !== nextIndex).concat(nextIndex); currentItem = { ...group.items[nextIndex], index: nextIndex };
    }
    function renderQuiz() {
      const area = document.getElementById('quizArea'); const group = GROUPS[activeGroup]; const stats = groupStats(activeGroup); document.getElementById('activeTitle').textContent = group.title;
      if (!currentItem) pickNext(true);
      if (!currentItem) { area.innerHTML = `<div class="empty"><h2>${TEXT.done_title}</h2><p>${TEXT.done_desc}</p></div>`; return; }
      const count = countOf(activeGroup, currentItem.index);
      area.innerHTML = `<div class="question"><div class="count">${TEXT.current}?${count} / 2</div><div class="zh">${currentItem.chinese}</div></div><form class="input-row" id="answerForm" autocomplete="off"><input id="answerInput" name="answer" type="text" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="${TEXT.input}"><button class="submit" type="submit">${TEXT.submit}</button></form><div class="feedback" id="feedback"></div><div class="progress-strip"><div class="bar"><span style="width:${Math.round(stats.points / stats.max * 100)}%"></span></div><div class="word-grid">${group.items.map((_, i) => `<div class="dot ${countOf(activeGroup, i) === 1 ? 'one' : countOf(activeGroup, i) >= 2 ? 'two' : ''}">${countOf(activeGroup, i)}/2</div>`).join('')}</div></div>`;
      const input = document.getElementById('answerInput'); input.focus();
      document.getElementById('answerForm').addEventListener('submit', event => {
        event.preventDefault(); const feedback = document.getElementById('feedback'); const answer = normalizeAnswer(input.value);
        if (answer === currentItem.english) { const nextCount = countOf(activeGroup, currentItem.index) + 1; setCount(activeGroup, currentItem.index, nextCount); feedback.textContent = nextCount >= 2 ? TEXT.ok_done : TEXT.ok_once; feedback.className = 'feedback ok'; input.value = ''; setTimeout(() => { pickNext(true); render(); }, 420); }
        else {
          feedback.innerHTML = `${TEXT.bad}<br>${TEXT.answer}：<strong>${currentItem.english}</strong><br><button class="soft-btn" id="nextAfterWrong" type="button">${TEXT.next}</button>`;
          feedback.className = 'feedback bad';
          input.disabled = true;
          document.getElementById('nextAfterWrong').addEventListener('click', () => { pickNext(true); render(); });
        }
      });
    }
    function render() { renderGroups(); renderQuiz(); }
    document.getElementById('shuffleBtn').addEventListener('click', () => { shuffleArray(localOrder[activeGroup]); pickNext(true); render(); });
    document.getElementById('exportBtn').addEventListener('click', async () => {
      const code = encodeProgressCode();
      try {
        await navigator.clipboard.writeText(code);
        showSyncNote('进度码已复制，去另一台设备点“导入进度”粘贴即可。');
      } catch {
        prompt('复制下面这段进度码，到另一台设备导入：', code);
        showSyncNote('如果没有自动复制，请手动复制弹窗里的进度码。');
      }
    });
    document.getElementById('importBtn').addEventListener('click', () => {
      const code = prompt('粘贴从另一台设备导出的进度码：');
      if (!code) return;
      try {
        progress = decodeProgressCode(code);
        saveProgress();
        currentItem = null;
        pickNext(true);
        render();
        showSyncNote('进度已导入。');
      } catch {
        showSyncNote('导入失败：进度码格式不对。');
      }
    });
    document.getElementById('resetGroupBtn').addEventListener('click', () => { GROUPS[activeGroup].items.forEach((_, i) => delete progress[keyOf(activeGroup, i)]); saveProgress(); pickNext(true); render(); });
    document.getElementById('resetAllBtn').addEventListener('click', () => { if (!confirm(TEXT.confirm)) return; progress = {}; saveProgress(); pickNext(true); render(); });
    render();
  </script>
